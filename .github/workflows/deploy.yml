name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# 加上這段權限（解決 id-token: write 錯誤）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './20260430'     # 你的作業資料夾名稱

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
